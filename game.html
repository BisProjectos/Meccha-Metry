<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meccha Metry - Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
    
    <!-- Core Libraries -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="server/p2p.js"></script>

    <style>
        :root { --bg-color: #1a1a1a; --text-color: #e0e0e0; --accent-color: #ff4a4a; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Russo One', sans-serif; background-color: var(--bg-color); color: var(--text-color); overflow: hidden; height: 100vh; }
        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        /* UI Overlay layer - ui.js will manage the contents of these */
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .ui-layer > * { pointer-events: auto; }
        
        #hud-container { position: absolute; top: 20px; left: 20px; }
        #host-menu { position: absolute; top: 20px; right: 20px; display: none; }
        #painter-ui { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: none; }
        #pose-wheel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; }
    </style>
</head>
<body>
    <!-- 3D Canvas -->
    <canvas id="game-canvas"></canvas>

    <!-- UI Containers managed by game/ui.js -->
    <div class="ui-layer">
        <div id="hud-container"></div>       <!-- Timer, Role, Leave Button -->
        <div id="host-menu"></div>           <!-- Host round settings -->
        <div id="painter-ui"></div>          <!-- Color wheel, sliders, tools -->
        <div id="pose-wheel"></div>          <!-- Sit, lie, stand wheel -->
    </div>

    <!-- 
        Game Systems loaded in strict order.
        We will build these 1 by 1.
    -->
    <script src="assets/playermodel.js"></script>
    <script src="game/ui.js"></script>
    <script src="game/playerpainting.js"></script>
    <script src="game/playerposes.js"></script>
    <script src="game/controls.js"></script>
    <script src="game/climbingcontrols.js"></script>
    <script src="game/painter.js"></script>
    <script src="game/cameracontrols.js"></script>
    <script src="game/intermissionmap.js"></script>
    <script src="game/maphandaling.js"></script>
    <script src="game/rolehandaler.js"></script>
    <script src="game/gamemode.js"></script>
    <script src="game/main.js"></script>
</body>
</html>
